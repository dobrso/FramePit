{% extends 'base.html' %}

{% block title %}
    Профиль {{ profile.user.username }}
{% endblock %}

{% block content %}
    {% if profile.image %}
        <img src="{{ profile.image.url }}" alt="avatar">
    {% endif %}
    {{ profile.user.username }}

    {% if request.user == profile.user %}
        <a href="{% url 'users:profile_update' profile.user.id %}">Редактировать профиль</a>
        <a href="{% url 'users:profile_delete' profile.user.id %}">Удалить профиль</a>
    {% endif %}
{% endblock %}
